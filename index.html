<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Kaplay Local Test</title>
    <script src="kaplay.js"></script>
    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      const k = kaplay({
        background: [255, 255, 255],
        touchToMouse: true, // 터치를 마우스 클릭으로 자동 인식
      });

      // 마지막으로 플레이한 게임을 기억해둘 변수
      let lastGame = "";
      const games = ["main", "shooter", "match3"];

      // --- 겹치지 않는 랜덤 게임 실행 함수 ---
      function startRandomGame() {
        // 1. 전체 게임 목록에서 '방금 한 게임(lastGame)'을 제외한 새 목록을 만듭니다.
        const availableGames = games.filter((game) => game !== lastGame);

        // 2. 남은 게임들 중에서만 랜덤으로 하나를 뽑습니다.
        const nextGame =
          availableGames[Math.floor(Math.random() * availableGames.length)];

        // 3. 다음 턴을 위해 방금 뽑은 게임을 기록해 둡니다.
        lastGame = nextGame;

        // 4. 해당 게임 씬으로 이동!
        k.go(nextGame);
      }

      // 1. 공룡 게임 (Dino Run)
      k.scene("main", () => {
        k.setGravity(1600);
        let score = 0;
        const FLOOR_HEIGHT = 48;

        const player = k.add([
          k.text("🦖", { size: 64 }),
          k.pos(80, k.height() - FLOOR_HEIGHT),
          k.area(),
          k.body(),
          k.anchor("bot"),
          k.color(0, 0, 0),
        ]);

        k.add([
          k.rect(k.width(), 2),
          k.pos(0, k.height() - FLOOR_HEIGHT),
          k.area(),
          k.body({ isStatic: true }),
          k.color(0, 0, 0),
        ]);

        const scoreLabel = k.add([
          k.text("Score: 0", { size: 24 }),
          k.pos(k.width() - 150, 24),
          k.color(0, 0, 0),
        ]);

        // 점프 함수 (에러 수정됨)
        function jump() {
          if (player.isGrounded()) {
            player.jump(750);
          }
        }

        // 입력 처리 (키보드 + 터치)
        k.onKeyPress("space", jump);
        k.onMousePress(jump);

        function spawnObstacle() {
          k.add([
            k.text(k.choose(["🌵", "🧱", "🪨"]), { size: 56 }),
            k.area(),
            k.pos(k.width(), k.height() - FLOOR_HEIGHT),
            k.anchor("bot"),
            k.move(k.LEFT, 260),
            k.color(0, 0, 0),
            "obstacle",
            { passed: false },
          ]);
          k.wait(k.rand(1.5, 3), spawnObstacle);
        }
        spawnObstacle();

        k.onUpdate("obstacle", (obj) => {
          if (obj.pos.x < player.pos.x && !obj.passed) {
            score++;
            obj.passed = true;
            scoreLabel.text = "Score: " + score;
          }
        });

        player.onCollide("obstacle", () => {
          k.shake();
          k.go("lose", score);
        });
      });

      // 2. 슈팅 게임 (Shooter) - 에러 수정됨 ★
      k.scene("shooter", () => {
        k.background = [20, 20, 40];
        let score = 0;

        // ★ 모바일 화면 너비에 맞춘 동적 사이즈 (화면 너비의 15% 크기)
        const baseSize = k.width() * 0.1;

        // 우주선 (크기 키움)
        const player = k.add([
          k.text("🚀", { size: baseSize }),
          k.pos(k.width() / 2, k.height() - baseSize * 2), // 위치도 하단에 맞게 조정
          k.area(),
          k.anchor("center"),
          "player",
        ]);

        // 점수판도 보기 좋게 추가했습니다
        const scoreLabel = k.add([
          k.text("Score: 0", { size: baseSize * 0.5 }),
          k.pos(20, 20),
          k.color(255, 255, 255),
        ]);

        // [모바일 최적화] 터치/마우스 위치를 따라다니도록 수정
        k.onUpdate(() => {
          if (k.isMouseDown()) {
            const mPos = k.mousePos();
            player.pos.x = k.lerp(player.pos.x, mPos.x, 0.2);
          }
        });

        // 화면 터치 시 총알 발사
        k.onMousePress(() => {
          k.add([
            // 총알 크기도 baseSize에 비례해서 두툼하게 키움
            k.rect(baseSize * 0.15, baseSize * 0.5),
            k.pos(player.pos.x, player.pos.y - baseSize),
            k.color(0, 255, 255),
            k.area(),
            k.move(k.UP, 800), // 커진 화면에 맞춰 총알 속도도 살짝 빠르게 (600 -> 800)
            k.offscreen({ destroy: true }),
            "bullet",
          ]);
        });

        // 키보드 지원 유지
        k.onKeyPress("space", () => {
          k.onMousePress(); // 터치 발사 로직 재활용
        });

        // 적 생성
        function spawnEnemy() {
          k.add([
            k.text("☄️", { size: baseSize * 0.9 }), // 운석은 우주선보다 살짝 작게
            // 운석이 화면 밖에서 튀어나오지 않도록 x좌표 범위 제한
            k.pos(k.rand(baseSize, k.width() - baseSize), -baseSize),
            k.area(),
            k.move(k.DOWN, k.rand(200, 400)), // 떨어지는 속도를 약간 랜덤하게!
            k.offscreen({ destroy: true }),
            "enemy",
          ]);
          k.wait(k.rand(0.4, 1.0), spawnEnemy);
        }
        spawnEnemy();

        // 폭발 입자 생성 함수 (크기도 커짐)
        function addExplosion(p) {
          for (let i = 0; i < 8; i++) {
            k.add([
              k.pos(p),
              // 파편 크기도 동적으로 계산
              k.rect(
                k.rand(baseSize * 0.1, baseSize * 0.2),
                k.rand(baseSize * 0.1, baseSize * 0.2),
              ),
              k.color(255, 255, 255),
              k.move(k.rand(0, 360), k.rand(150, 300)),
              k.opacity(1),
              "exp",
            ]);
          }
        }

        // 폭발 파티클 관리 로직 (에러 방지용으로 분리했던 것 유지)
        k.onUpdate("exp", (particle) => {
          particle.opacity -= k.dt() * 2;
          if (particle.opacity <= 0) {
            k.destroy(particle);
          }
        });

        // 충돌 처리 (총알 vs 운석)
        k.onCollide("bullet", "enemy", (b, e) => {
          k.destroy(b);
          k.destroy(e);
          score += 10;
          scoreLabel.text = `Score: ${score}`; // 점수판 업데이트
          addExplosion(e.pos);
        });

        // 충돌 처리 (우주선 vs 운석)
        player.onCollide("enemy", () => {
          k.shake(10); // 부딪히면 화면 진동 쾅!
          k.go("lose", score);
        });
      });

      // 3. 클리커 게임 (Clicker)
      k.scene("clicker", () => {
        k.background = [255, 230, 200];
        let money = 0;
        let autoClickRate = 0;

        const moneyLabel = k.add([
          k.text(`Money: $${money}`, { size: 42 }),
          k.pos(k.center().x, 80),
          k.anchor("center"),
          k.color(0, 0, 0),
        ]);

        const cookie = k.add([
          k.text("🍪", { size: 140 }),
          k.pos(k.center()),
          k.anchor("center"),
          k.area(),
        ]);

        // [모바일 최적화] 아이콘 터치 시 작동
        cookie.onClick(() => {
          money += 1;
          cookie.scale = k.vec2(1.2);
          k.wait(0.1, () => (cookie.scale = k.vec2(1)));
        });

        const upgradeBtn = k.add([
          k.rect(320, 70, { radius: 10 }),
          k.pos(k.center().x, k.height() - 100),
          k.anchor("center"),
          k.color(0, 200, 100),
          k.area(),
        ]);

        const upgradeText = k.add([
          k.text("Buy Auto-Clicker ($10)", { size: 22 }),
          k.pos(k.center().x, k.height() - 100),
          k.anchor("center"),
        ]);

        upgradeBtn.onClick(() => {
          if (money >= 10) {
            money -= 10;
            autoClickRate += 1;
          }
        });

        k.onUpdate(() => {
          money += autoClickRate * k.dt();
          moneyLabel.text = `Money: $${Math.floor(money)}`;
        });

        k.onUpdate(() => {
          if (money >= 100) {
            k.add([
              k.text("CLEAR!", { size: 50 }),
              k.pos(k.center()),
              k.anchor("center"),
            ]);
            k.wait(2, () => k.go("lose", 100));
          }
        });
      });

      k.scene("match3", () => {
        k.background = [250, 240, 230];

        const BOARD_SIZE = 5;
        const minDimension = Math.min(k.width(), k.height());
        const TILE_SIZE = (minDimension * 0.85) / BOARD_SIZE;
        const CONTENT_SIZE = TILE_SIZE * 0.8;

        // 이모지 또는 멤버 이름 (원하시는 것으로 유지하세요)
        const TYPES = ["🐨", "🐹", "🐱", "🐿️", "🐥", "🐻", "🐰"];

        let board = [];
        let isLocked = false;
        let swipeStartPos = null;
        let swipingTile = null;

        const offsetX =
          k.center().x - (BOARD_SIZE * TILE_SIZE) / 2 + TILE_SIZE / 2;
        const offsetY =
          k.center().y - (BOARD_SIZE * TILE_SIZE) / 2 + TILE_SIZE / 2;

        // --- 1. 초기 생성 ---
        for (let x = 0; x < BOARD_SIZE; x++) {
          board[x] = [];
          for (let y = 0; y < BOARD_SIZE; y++) {
            board[x][y] = null; // 초기화만 해두고 셔플 로직을 활용해 채웁니다.
          }
        }

        k.add([
          k.text("Puzzle", { size: Math.max(24, TILE_SIZE / 2) }),
          k.pos(k.center().x, 60),
          k.anchor("center"),
          k.color(100, 50, 0),
        ]);

        // --- 2. 스와이프 로직 ---
        k.onMousePress(() => {
          if (isLocked) return;
          let mPos = k.mousePos();
          for (let t of k.get("tile")) {
            if (
              Math.abs(t.pos.x - mPos.x) < TILE_SIZE / 2 &&
              Math.abs(t.pos.y - mPos.y) < TILE_SIZE / 2
            ) {
              swipingTile = t;
              swipeStartPos = mPos;
              break;
            }
          }
        });

        k.onMouseRelease(() => {
          if (!swipingTile || !swipeStartPos || isLocked) return;
          let mPos = k.mousePos();
          let dx = mPos.x - swipeStartPos.x;
          let dy = mPos.y - swipeStartPos.y;

          const minSwipeDistance = TILE_SIZE / 4;
          if (
            Math.abs(dx) > minSwipeDistance ||
            Math.abs(dy) > minSwipeDistance
          ) {
            let targetX = swipingTile.gridX;
            let targetY = swipingTile.gridY;
            if (Math.abs(dx) > Math.abs(dy)) {
              targetX += dx > 0 ? 1 : -1;
            } else {
              targetY += dy > 0 ? 1 : -1;
            }
            if (
              targetX >= 0 &&
              targetX < BOARD_SIZE &&
              targetY >= 0 &&
              targetY < BOARD_SIZE
            ) {
              let targetTile = board[targetX][targetY];
              if (targetTile) {
                swapTiles(swipingTile, targetTile);
              }
            }
          }
          swipingTile = null;
          swipeStartPos = null;
        });

        function swapTiles(tileA, tileB) {
          isLocked = true;
          const posA = k.vec2(tileA.pos.x, tileA.pos.y);
          const posB = k.vec2(tileB.pos.x, tileB.pos.y);

          k.tween(
            tileA.pos,
            posB,
            0.2,
            (p) => (tileA.pos = p),
            k.easings.easeOutQuad,
          );
          k.tween(
            tileB.pos,
            posA,
            0.2,
            (p) => (tileB.pos = p),
            k.easings.easeOutQuad,
          );

          const tempX = tileA.gridX;
          const tempY = tileA.gridY;
          tileA.gridX = tileB.gridX;
          tileA.gridY = tileB.gridY;
          tileB.gridX = tempX;
          tileB.gridY = tempY;

          board[tileA.gridX][tileA.gridY] = tileA;
          board[tileB.gridX][tileB.gridY] = tileB;

          k.wait(0.25, () => checkMatches({ tileA: tileA, tileB: tileB }));
        }

        // --- 3. 매치 검사 ---
        function checkMatches(swappedTiles = null) {
          let matched = new Set();

          for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE - 2; x++) {
              let t1 = board[x][y],
                t2 = board[x + 1][y],
                t3 = board[x + 2][y];
              if (
                t1 &&
                t2 &&
                t3 &&
                t1.type === t2.type &&
                t2.type === t3.type
              ) {
                matched.add(t1);
                matched.add(t2);
                matched.add(t3);
              }
            }
          }
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = 0; y < BOARD_SIZE - 2; y++) {
              let t1 = board[x][y],
                t2 = board[x][y + 1],
                t3 = board[x][y + 2];
              if (
                t1 &&
                t2 &&
                t3 &&
                t1.type === t2.type &&
                t2.type === t3.type
              ) {
                matched.add(t1);
                matched.add(t2);
                matched.add(t3);
              }
            }
          }

          if (matched.size > 0) {
            k.shake(2);
            matched.forEach((t) => {
              k.destroy(t);
              board[t.gridX][t.gridY] = null;
            });
            k.wait(0.2, applyGravity);
          } else {
            if (swappedTiles) {
              // 매칭 실패 시 되돌리기
              let tA = swappedTiles.tileA,
                tB = swappedTiles.tileB;
              const posA = k.vec2(tA.pos.x, tA.pos.y);
              const posB = k.vec2(tB.pos.x, tB.pos.y);
              k.tween(
                tA.pos,
                posB,
                0.2,
                (p) => (tA.pos = p),
                k.easings.easeOutQuad,
              );
              k.tween(
                tB.pos,
                posA,
                0.2,
                (p) => (tB.pos = p),
                k.easings.easeOutQuad,
              );

              const tempX = tA.gridX,
                tempY = tA.gridY;
              tA.gridX = tB.gridX;
              tA.gridY = tB.gridY;
              tB.gridX = tempX;
              tB.gridY = tempY;
              board[tA.gridX][tA.gridY] = tA;
              board[tB.gridX][tB.gridY] = tB;

              k.wait(0.25, () => (isLocked = false));
            } else {
              // ★ 더 이상 터질 게 없을 때, 데드락(진행 불가)인지 검사합니다!
              if (!hasAnyMove()) {
                shuffleBoard(); // 진행 불가면 판 엎기!
              } else {
                isLocked = false;
              }
            }
          }
        }

        // --- 4. 중력 & 리필 ---
        function applyGravity() {
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = BOARD_SIZE - 1; y >= 0; y--) {
              if (board[x][y] === null) {
                for (let aboveY = y - 1; aboveY >= 0; aboveY--) {
                  if (board[x][aboveY] !== null) {
                    let tileToFall = board[x][aboveY];
                    board[x][y] = tileToFall;
                    board[x][aboveY] = null;
                    tileToFall.gridY = y;
                    const targetPos = k.vec2(
                      x * TILE_SIZE + offsetX,
                      y * TILE_SIZE + offsetY,
                    );
                    k.tween(
                      tileToFall.pos,
                      targetPos,
                      0.2,
                      (p) => (tileToFall.pos = p),
                      k.easings.easeOutQuad,
                    );
                    break;
                  }
                }
              }
            }
          }
          k.wait(0.25, fillEmptySpaces);
        }

        function fillEmptySpaces() {
          let filled = false;
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = 0; y < BOARD_SIZE; y++) {
              if (board[x][y] === null) {
                filled = true;
                const itemType = k.choose(TYPES);
                const newTile = k.add([
                  k.text(itemType, { size: CONTENT_SIZE }),
                  k.pos(x * TILE_SIZE + offsetX, offsetY - minDimension * 0.3),
                  k.anchor("center"),
                  k.area(),
                  "tile",
                  { gridX: x, gridY: y, type: itemType },
                ]);
                board[x][y] = newTile;
                const targetPos = k.vec2(
                  x * TILE_SIZE + offsetX,
                  y * TILE_SIZE + offsetY,
                );
                k.tween(
                  newTile.pos,
                  targetPos,
                  0.2,
                  (p) => (newTile.pos = p),
                  k.easings.easeOutQuad,
                );
              }
            }
          }
          // 채워졌든 안 채워졌든 무조건 checkMatches를 불러서 데드락 검사를 수행하게 합니다.
          if (filled) {
            k.wait(0.3, () => checkMatches());
          } else {
            checkMatches();
          }
        }

        // --- ★ 5. 경우의 수 예측 및 셔플 알고리즘 ★ ---

        // 현재 보드에 한 번의 스와이프로 매칭될 가능성이 있는지 가상으로 스캔합니다.
        function hasAnyMove() {
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = 0; y < BOARD_SIZE; y++) {
              // 오른쪽 타일과 바꿔보기 테스트
              if (x < BOARD_SIZE - 1) {
                if (testSwap(x, y, x + 1, y)) return true;
              }
              // 아래쪽 타일과 바꿔보기 테스트
              if (y < BOARD_SIZE - 1) {
                if (testSwap(x, y, x, y + 1)) return true;
              }
            }
          }
          return false; // 모든 경우의 수를 돌렸는데도 true가 안 나오면 진행 불가 상태!
        }

        // 두 타일을 가상으로 바꾼 뒤, 3개가 맞춰지는지 확인하고 다시 원래대로 돌려놓습니다.
        function testSwap(x1, y1, x2, y2) {
          if (!board[x1][y1] || !board[x2][y2]) return false;

          let type1 = board[x1][y1].type;
          let type2 = board[x2][y2].type;

          // 가상 교환
          board[x1][y1].type = type2;
          board[x2][y2].type = type1;

          // 매칭 여부 확인
          let isMatch = checkSingleMatch(x1, y1) || checkSingleMatch(x2, y2);

          // 다시 원상 복구
          board[x1][y1].type = type1;
          board[x2][y2].type = type2;

          return isMatch;
        }

        // 특정 좌표(x, y)를 기준으로 가로/세로 3개가 연속되는지 단일 검사
        function checkSingleMatch(x, y) {
          let type = board[x][y].type;
          let countH = 1,
            countV = 1;

          for (
            let i = x - 1;
            i >= 0 && board[i][y] && board[i][y].type === type;
            i--
          )
            countH++;
          for (
            let i = x + 1;
            i < BOARD_SIZE && board[i][y] && board[i][y].type === type;
            i++
          )
            countH++;
          for (
            let j = y - 1;
            j >= 0 && board[x][j] && board[x][j].type === type;
            j--
          )
            countV++;
          for (
            let j = y + 1;
            j < BOARD_SIZE && board[x][j] && board[x][j].type === type;
            j++
          )
            countV++;

          return countH >= 3 || countV >= 3;
        }

        // 진행이 불가능할 때 기존 블록을 모두 파괴하고 새로 위에서 떨어뜨립니다.
        function shuffleBoard() {
          isLocked = true;

          // 화면 중앙에 SHUFFLE 경고 텍스트 띄우기
          k.add([
            k.text("SHUFFLE!", { size: Math.max(32, k.width() * 0.1) }),
            k.pos(k.center()),
            k.anchor("center"),
            k.color(255, 50, 50),
            k.lifespan(1.5, { fade: 0.5 }), // 1.5초 뒤 서서히 사라짐
            k.z(100),
          ]);

          k.wait(1.5, () => {
            // 모든 타일 폭파
            for (let x = 0; x < BOARD_SIZE; x++) {
              for (let y = 0; y < BOARD_SIZE; y++) {
                if (board[x][y]) {
                  k.destroy(board[x][y]);
                  board[x][y] = null;
                }
              }
            }
            // 전체 빈칸 리필 로직 재호출
            fillEmptySpaces();
          });
        }

        // 게임 시작
        fillEmptySpaces();
      });

      // 공통 게임 오버 장면
      k.scene("lose", (finalScore) => {
        k.background = [255, 255, 255];
        k.add([
          k.text("GAME OVER", { size: 64 }),
          k.pos(k.center().x, k.center().y - 40),
          k.anchor("center"),
          k.color(0, 0, 0),
        ]);

        k.add([
          k.text(`Score: ${finalScore}`, { size: 32 }),
          k.pos(k.center().x, k.center().y + 30),
          k.anchor("center"),
          k.color(100, 100, 100),
        ]);

        const btn = k.add([
          k.rect(220, 60, { radius: 8 }),
          k.pos(k.center().x, k.center().y + 120),
          k.anchor("center"),
          k.color(0, 0, 0),
          k.area(),
        ]);

        k.add([
          k.text("NEXT RANDOM", { size: 20 }),
          k.pos(k.center().x, k.center().y + 120),
          k.anchor("center"),
          k.color(255, 255, 255),
        ]);

        btn.onClick(startRandomGame);
        k.onKeyPress("space", startRandomGame);
      });

      // --- 첫 실행 ---
      startRandomGame();
    </script>
  </body>
</html>
