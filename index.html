<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Kaplay Local Test</title>
    <script src="kaplay.js"></script>
    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      const k = kaplay({
        background: [255, 255, 255],
        touchToMouse: true, // 터치를 마우스 클릭으로 자동 인식
      });

      // 마지막으로 플레이한 게임을 기억해둘 변수
      let lastGame = "";
      const games = ["main", "shooter", "match3"];

      // --- 겹치지 않는 랜덤 게임 실행 함수 ---
      function startRandomGame() {
        // 1. 전체 게임 목록에서 '방금 한 게임(lastGame)'을 제외한 새 목록을 만듭니다.
        const availableGames = games.filter((game) => game !== lastGame);

        // 2. 남은 게임들 중에서만 랜덤으로 하나를 뽑습니다.
        const nextGame =
          availableGames[Math.floor(Math.random() * availableGames.length)];

        // 3. 다음 턴을 위해 방금 뽑은 게임을 기록해 둡니다.
        lastGame = nextGame;

        // 4. 해당 게임 씬으로 이동!
        k.go(nextGame);
      }

      // 1. 공룡 게임 (Dino Run)
      k.scene("main", () => {
        k.setGravity(1600);
        let score = 0;
        const FLOOR_HEIGHT = 48;

        const player = k.add([
          k.text("🦖", { size: 64 }),
          k.pos(80, k.height() - FLOOR_HEIGHT),
          k.area(),
          k.body(),
          k.anchor("bot"),
          k.color(0, 0, 0),
        ]);

        k.add([
          k.rect(k.width(), 2),
          k.pos(0, k.height() - FLOOR_HEIGHT),
          k.area(),
          k.body({ isStatic: true }),
          k.color(0, 0, 0),
        ]);

        const scoreLabel = k.add([
          k.text("Score: 0", { size: 24 }),
          k.pos(k.width() - 150, 24),
          k.color(0, 0, 0),
        ]);

        // 점프 함수 (에러 수정됨)
        function jump() {
          if (player.isGrounded()) {
            player.jump(750);
          }
        }

        // 입력 처리 (키보드 + 터치)
        k.onKeyPress("space", jump);
        k.onMousePress(jump);

        function spawnObstacle() {
          k.add([
            k.text(k.choose(["🌵", "🧱", "🪨"]), { size: 56 }),
            k.area(),
            k.pos(k.width(), k.height() - FLOOR_HEIGHT),
            k.anchor("bot"),
            k.move(k.LEFT, 260),
            k.color(0, 0, 0),
            "obstacle",
            { passed: false },
          ]);
          k.wait(k.rand(1.5, 3), spawnObstacle);
        }
        spawnObstacle();

        k.onUpdate("obstacle", (obj) => {
          if (obj.pos.x < player.pos.x && !obj.passed) {
            score++;
            obj.passed = true;
            scoreLabel.text = "Score: " + score;
          }
        });

        player.onCollide("obstacle", () => {
          k.shake();
          k.go("lose", score);
        });
      });

      // 2. 슈팅 게임 (Shooter) - 에러 수정됨 ★
      k.scene("shooter", () => {
        k.background = [20, 20, 40];
        let score = 0;

        // ★ 모바일 화면 너비에 맞춘 동적 사이즈 (화면 너비의 15% 크기)
        const baseSize = k.width() * 0.1;

        // 우주선 (크기 키움)
        const player = k.add([
          k.text("🚀", { size: baseSize }),
          k.pos(k.width() / 2, k.height() - baseSize * 2), // 위치도 하단에 맞게 조정
          k.area(),
          k.anchor("center"),
          "player",
        ]);

        // 점수판도 보기 좋게 추가했습니다
        const scoreLabel = k.add([
          k.text("Score: 0", { size: baseSize * 0.5 }),
          k.pos(20, 20),
          k.color(255, 255, 255),
        ]);

        // [모바일 최적화] 터치/마우스 위치를 따라다니도록 수정
        k.onUpdate(() => {
          if (k.isMouseDown()) {
            const mPos = k.mousePos();
            player.pos.x = k.lerp(player.pos.x, mPos.x, 0.2);
          }
        });

        // 화면 터치 시 총알 발사
        k.onMousePress(() => {
          k.add([
            // 총알 크기도 baseSize에 비례해서 두툼하게 키움
            k.rect(baseSize * 0.15, baseSize * 0.5),
            k.pos(player.pos.x, player.pos.y - baseSize),
            k.color(0, 255, 255),
            k.area(),
            k.move(k.UP, 800), // 커진 화면에 맞춰 총알 속도도 살짝 빠르게 (600 -> 800)
            k.offscreen({ destroy: true }),
            "bullet",
          ]);
        });

        // 키보드 지원 유지
        k.onKeyPress("space", () => {
          k.onMousePress(); // 터치 발사 로직 재활용
        });

        // 적 생성
        function spawnEnemy() {
          k.add([
            k.text("☄️", { size: baseSize * 0.9 }), // 운석은 우주선보다 살짝 작게
            // 운석이 화면 밖에서 튀어나오지 않도록 x좌표 범위 제한
            k.pos(k.rand(baseSize, k.width() - baseSize), -baseSize),
            k.area(),
            k.move(k.DOWN, k.rand(200, 400)), // 떨어지는 속도를 약간 랜덤하게!
            k.offscreen({ destroy: true }),
            "enemy",
          ]);
          k.wait(k.rand(0.4, 1.0), spawnEnemy);
        }
        spawnEnemy();

        // 폭발 입자 생성 함수 (크기도 커짐)
        function addExplosion(p) {
          for (let i = 0; i < 8; i++) {
            k.add([
              k.pos(p),
              // 파편 크기도 동적으로 계산
              k.rect(
                k.rand(baseSize * 0.1, baseSize * 0.2),
                k.rand(baseSize * 0.1, baseSize * 0.2),
              ),
              k.color(255, 255, 255),
              k.move(k.rand(0, 360), k.rand(150, 300)),
              k.opacity(1),
              "exp",
            ]);
          }
        }

        // 폭발 파티클 관리 로직 (에러 방지용으로 분리했던 것 유지)
        k.onUpdate("exp", (particle) => {
          particle.opacity -= k.dt() * 2;
          if (particle.opacity <= 0) {
            k.destroy(particle);
          }
        });

        // 충돌 처리 (총알 vs 운석)
        k.onCollide("bullet", "enemy", (b, e) => {
          k.destroy(b);
          k.destroy(e);
          score += 10;
          scoreLabel.text = `Score: ${score}`; // 점수판 업데이트
          addExplosion(e.pos);
        });

        // 충돌 처리 (우주선 vs 운석)
        player.onCollide("enemy", () => {
          k.shake(10); // 부딪히면 화면 진동 쾅!
          k.go("lose", score);
        });
      });

      // 3. 클리커 게임 (Clicker)
      k.scene("clicker", () => {
        k.background = [255, 230, 200];
        let money = 0;
        let autoClickRate = 0;

        const moneyLabel = k.add([
          k.text(`Money: $${money}`, { size: 42 }),
          k.pos(k.center().x, 80),
          k.anchor("center"),
          k.color(0, 0, 0),
        ]);

        const cookie = k.add([
          k.text("🍪", { size: 140 }),
          k.pos(k.center()),
          k.anchor("center"),
          k.area(),
        ]);

        // [모바일 최적화] 아이콘 터치 시 작동
        cookie.onClick(() => {
          money += 1;
          cookie.scale = k.vec2(1.2);
          k.wait(0.1, () => (cookie.scale = k.vec2(1)));
        });

        const upgradeBtn = k.add([
          k.rect(320, 70, { radius: 10 }),
          k.pos(k.center().x, k.height() - 100),
          k.anchor("center"),
          k.color(0, 200, 100),
          k.area(),
        ]);

        const upgradeText = k.add([
          k.text("Buy Auto-Clicker ($10)", { size: 22 }),
          k.pos(k.center().x, k.height() - 100),
          k.anchor("center"),
        ]);

        upgradeBtn.onClick(() => {
          if (money >= 10) {
            money -= 10;
            autoClickRate += 1;
          }
        });

        k.onUpdate(() => {
          money += autoClickRate * k.dt();
          moneyLabel.text = `Money: $${Math.floor(money)}`;
        });

        k.onUpdate(() => {
          if (money >= 100) {
            k.add([
              k.text("CLEAR!", { size: 50 }),
              k.pos(k.center()),
              k.anchor("center"),
            ]);
            k.wait(2, () => k.go("lose", 100));
          }
        });
      });

      k.scene("match3", () => {
        k.background = [250, 240, 230];

        const BOARD_SIZE = 5;
        const minDimension = Math.min(k.width(), k.height());
        const TILE_SIZE = (minDimension * 0.85) / BOARD_SIZE;
        const CONTENT_SIZE = TILE_SIZE * 0.8;

        // ★ 확률 최적화: 5x5 보드에서는 5종류가 황금 비율입니다! (2개 제외)
        const TYPES = ["🐨", "🐹", "🐱", "🐥", "🐰"];

        let board = [];
        let isLocked = false;
        let swipeStartPos = null;
        let swipingTile = null;
        let score = 0;

        let timeLeft = 60;
        let gameEnded = false;

        const offsetX =
          k.center().x - (BOARD_SIZE * TILE_SIZE) / 2 + TILE_SIZE / 2;
        const offsetY =
          k.center().y - (BOARD_SIZE * TILE_SIZE) / 2 + TILE_SIZE / 2 + 20;

        // --- 1. 초기 생성 ---
        for (let x = 0; x < BOARD_SIZE; x++) {
          board[x] = [];
          for (let y = 0; y < BOARD_SIZE; y++) {
            board[x][y] = null;
          }
        }

        // --- 2. 상단 UI ---
        k.add([
          k.text("Puzzle", { size: 24 }),
          k.pos(20, 30),
          k.anchor("left"),
          k.color(100, 50, 0),
        ]);
        const scoreLabel = k.add([
          k.text("Score: 0", { size: 30 }),
          k.pos(20, 70),
          k.anchor("left"),
          k.color(255, 100, 0),
        ]);
        const timerLabel = k.add([
          k.text(`Time: 60s`, { size: 30 }),
          k.pos(k.width() - 20, 70),
          k.anchor("right"),
          k.color(255, 0, 0),
        ]);

        k.onUpdate(() => {
          if (!gameEnded) {
            timeLeft -= k.dt();
            if (timeLeft <= 0) {
              timeLeft = 0;
              gameEnded = true;
              isLocked = true;
              k.shake(5);
              k.wait(0.5, () => k.go("lose", score));
            }
            timerLabel.text = `Time: ${Math.ceil(timeLeft)}s`;
          }
        });

        // --- 3. 스와이프 로직 ---
        k.onMousePress(() => {
          if (isLocked || gameEnded) return;
          let mPos = k.mousePos();
          for (let t of k.get("tile")) {
            if (
              Math.abs(t.pos.x - mPos.x) < TILE_SIZE / 2 &&
              Math.abs(t.pos.y - mPos.y) < TILE_SIZE / 2
            ) {
              swipingTile = t;
              swipeStartPos = mPos;
              break;
            }
          }
        });

        k.onMouseRelease(() => {
          if (!swipingTile || !swipeStartPos || isLocked || gameEnded) return;
          let mPos = k.mousePos();
          let dx = mPos.x - swipeStartPos.x,
            dy = mPos.y - swipeStartPos.y;

          const minSwipeDistance = TILE_SIZE / 4;
          if (
            Math.abs(dx) > minSwipeDistance ||
            Math.abs(dy) > minSwipeDistance
          ) {
            let targetX = swipingTile.gridX,
              targetY = swipingTile.gridY;
            if (Math.abs(dx) > Math.abs(dy)) targetX += dx > 0 ? 1 : -1;
            else targetY += dy > 0 ? 1 : -1;

            if (
              targetX >= 0 &&
              targetX < BOARD_SIZE &&
              targetY >= 0 &&
              targetY < BOARD_SIZE
            ) {
              let targetTile = board[targetX][targetY];
              if (targetTile) swapTiles(swipingTile, targetTile);
            }
          }
          swipingTile = null;
          swipeStartPos = null;
        });

        function swapTiles(tileA, tileB) {
          isLocked = true;
          const posA = k.vec2(tileA.pos.x, tileA.pos.y),
            posB = k.vec2(tileB.pos.x, tileB.pos.y);
          k.tween(
            tileA.pos,
            posB,
            0.2,
            (p) => (tileA.pos = p),
            k.easings.easeOutQuad,
          );
          k.tween(
            tileB.pos,
            posA,
            0.2,
            (p) => (tileB.pos = p),
            k.easings.easeOutQuad,
          );

          const tempX = tileA.gridX,
            tempY = tileA.gridY;
          tileA.gridX = tileB.gridX;
          tileA.gridY = tileB.gridY;
          tileB.gridX = tempX;
          tileB.gridY = tempY;
          board[tileA.gridX][tileA.gridY] = tileA;
          board[tileB.gridX][tileB.gridY] = tileB;

          k.wait(0.25, () => checkMatches({ tileA: tileA, tileB: tileB }));
        }

        // --- 4. 매치 검사 (버그 수정 버전) ---
        function checkMatches(swappedTiles = null) {
          // ★ 최우선 조건: 이미 게임이 끝났다면 어떤 로직도 실행하지 않음
          if (gameEnded) return;

          let matched = new Set();

          // 가로/세로 매칭 검사 로직 (동일)
          for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE - 2; x++) {
              let t1 = board[x][y],
                t2 = board[x + 1][y],
                t3 = board[x + 2][y];
              if (
                t1 &&
                t2 &&
                t3 &&
                t1.type === t2.type &&
                t2.type === t3.type
              ) {
                matched.add(t1);
                matched.add(t2);
                matched.add(t3);
              }
            }
          }
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = 0; y < BOARD_SIZE - 2; y++) {
              let t1 = board[x][y],
                t2 = board[x][y + 1],
                t3 = board[x][y + 2];
              if (
                t1 &&
                t2 &&
                t3 &&
                t1.type === t2.type &&
                t2.type === t3.type
              ) {
                matched.add(t1);
                matched.add(t2);
                matched.add(t3);
              }
            }
          }

          if (matched.size > 0) {
            // [터질 게 있을 때]
            k.shake(2);
            timeLeft = 60; // 시간 리셋
            timerLabel.color = k.rgb(0, 255, 0);
            k.wait(0.3, () => {
              if (!gameEnded) timerLabel.color = k.rgb(255, 0, 0);
            });

            let earnedPoints = matched.size * 10;
            score += earnedPoints;
            scoreLabel.text = `Score: ${score}`;

            k.add([
              k.text("+" + earnedPoints, {
                size: Math.max(40, k.width() * 0.1),
              }),
              k.pos(k.center()),
              k.anchor("center"),
              k.color(255, 150, 0),
              k.opacity(1),
              k.lifespan(1, { fade: 0.5 }),
              k.move(k.UP, 150),
              k.z(50),
            ]);

            matched.forEach((t) => {
              k.destroy(t);
              board[t.gridX][t.gridY] = null;
            });
            k.wait(0.2, applyGravity);
          } else {
            // [터질 게 없을 때]
            if (swappedTiles) {
              // 사용자가 직접 바꿨는데 꽝인 경우 -> 되돌리기
              let tA = swappedTiles.tileA,
                tB = swappedTiles.tileB;
              const posA = k.vec2(tA.pos.x, tA.pos.y),
                posB = k.vec2(tB.pos.x, tB.pos.y);
              k.tween(
                tA.pos,
                posB,
                0.2,
                (p) => (tA.pos = p),
                k.easings.easeOutQuad,
              );
              k.tween(
                tB.pos,
                posA,
                0.2,
                (p) => (tB.pos = p),
                k.easings.easeOutQuad,
              );

              const tempX = tA.gridX,
                tempY = tA.gridY;
              tA.gridX = tB.gridX;
              tA.gridY = tB.gridY;
              tB.gridX = tempX;
              tB.gridY = tempY;
              board[tA.gridX][tA.gridY] = tA;
              board[tB.gridX][tB.gridY] = tB;

              k.wait(0.25, () => {
                if (!gameEnded) isLocked = false;
              });
            } else {
              // 하늘에서 떨어졌는데 터질 게 없는 경우 -> 게임 계속 진행
              if (!hasAnyMove()) {
                forceValidMove(); // 스마트 드롭 작동
              }
              // ★ 핵심: 여기서 무조건 잠금을 푸는 게 아니라 게임 종료 여부를 한 번 더 확인
              if (!gameEnded) isLocked = false;
            }
          }
        }

        // --- 5. 중력 & 리필 ---
        function applyGravity() {
          if (gameEnded) return;
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = BOARD_SIZE - 1; y >= 0; y--) {
              if (board[x][y] === null) {
                for (let aboveY = y - 1; aboveY >= 0; aboveY--) {
                  if (board[x][aboveY] !== null) {
                    let tileToFall = board[x][aboveY];
                    board[x][y] = tileToFall;
                    board[x][aboveY] = null;
                    tileToFall.gridY = y;
                    const targetPos = k.vec2(
                      x * TILE_SIZE + offsetX,
                      y * TILE_SIZE + offsetY,
                    );
                    k.tween(
                      tileToFall.pos,
                      targetPos,
                      0.2,
                      (p) => (tileToFall.pos = p),
                      k.easings.easeOutQuad,
                    );
                    break;
                  }
                }
              }
            }
          }
          k.wait(0.25, fillEmptySpaces);
        }

        function fillEmptySpaces() {
          if (gameEnded) return;

          let newTiles = [];
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = 0; y < BOARD_SIZE; y++) {
              if (board[x][y] === null) {
                const itemType = k.choose(TYPES);
                const newTile = k.add([
                  k.text(itemType, { size: CONTENT_SIZE }),
                  k.pos(x * TILE_SIZE + offsetX, offsetY - minDimension * 0.3), // 화면 위 대기
                  k.anchor("center"),
                  k.area(),
                  "tile",
                  { gridX: x, gridY: y, type: itemType },
                ]);
                board[x][y] = newTile;
                newTiles.push(newTile);
              }
            }
          }

          // ★ 스마트 드롭: 타일이 내려오기 전에 검사해서 데드락을 원천 차단합니다.
          if (newTiles.length > 0 && !hasAnyMove()) {
            forceValidMove();
          }

          // 이제 안전이 확보된 타일들을 화면 아래로 떨어뜨립니다.
          newTiles.forEach((t) => {
            const targetPos = k.vec2(
              t.gridX * TILE_SIZE + offsetX,
              t.gridY * TILE_SIZE + offsetY,
            );
            k.tween(
              t.pos,
              targetPos,
              0.2,
              (p) => (t.pos = p),
              k.easings.easeOutQuad,
            );
          });

          if (newTiles.length > 0) {
            k.wait(0.3, () => checkMatches());
          } else {
            checkMatches();
          }
        }

        // --- 6. 경우의 수 예측 & 스마트 드롭 알고리즘 ---
        function hasAnyMove() {
          for (let x = 0; x < BOARD_SIZE; x++) {
            for (let y = 0; y < BOARD_SIZE; y++) {
              if (x < BOARD_SIZE - 1) if (testSwap(x, y, x + 1, y)) return true;
              if (y < BOARD_SIZE - 1) if (testSwap(x, y, x, y + 1)) return true;
            }
          }
          return false;
        }

        function testSwap(x1, y1, x2, y2) {
          if (!board[x1][y1] || !board[x2][y2]) return false;
          let type1 = board[x1][y1].type,
            type2 = board[x2][y2].type;
          board[x1][y1].type = type2;
          board[x2][y2].type = type1;
          let isMatch = checkSingleMatch(x1, y1) || checkSingleMatch(x2, y2);
          board[x1][y1].type = type1;
          board[x2][y2].type = type2;
          return isMatch;
        }

        function checkSingleMatch(x, y) {
          let type = board[x][y].type;
          let countH = 1,
            countV = 1;
          for (
            let i = x - 1;
            i >= 0 && board[i][y] && board[i][y].type === type;
            i--
          )
            countH++;
          for (
            let i = x + 1;
            i < BOARD_SIZE && board[i][y] && board[i][y].type === type;
            i++
          )
            countH++;
          for (
            let j = y - 1;
            j >= 0 && board[x][j] && board[x][j].type === type;
            j--
          )
            countV++;
          for (
            let j = y + 1;
            j < BOARD_SIZE && board[x][j] && board[x][j].type === type;
            j++
          )
            countV++;
          return countH >= 3 || countV >= 3;
        }

        // ★ 진행 불가 시 몰래 강제로 맞출 수 있는 패턴을 심는 함수
        function forceValidMove() {
          // 안전한 중앙 부근 좌표를 찾습니다.
          let rx = Math.floor(Math.random() * (BOARD_SIZE - 2));
          let ry = Math.floor(Math.random() * (BOARD_SIZE - 1));
          let type = k.choose(TYPES);

          const applyChange = (x, y, newType) => {
            if (board[x][y]) {
              board[x][y].type = newType;
              board[x][y].text = newType; // (참고: 사진을 쓸 경우 board[x][y].use(k.sprite(newType)) 사용)
            }
          };

          // ㄱ자 모양의 맞출 수 있는 함정 패턴 심기
          applyChange(rx, ry, type);
          applyChange(rx + 1, ry, type);
          applyChange(rx + 2, ry + 1, type);

          // 떨어지자마자 제멋대로 터지지 않도록 예방 조치
          let otherType = k.choose(TYPES.filter((t) => t !== type));
          applyChange(rx + 2, ry, otherType);
        }

        // 게임 시작
        fillEmptySpaces();
      });

      // 공통 게임 오버 장면
      k.scene("lose", (finalScore) => {
        k.background = [255, 255, 255];
        k.add([
          k.text("GAME OVER", { size: 64 }),
          k.pos(k.center().x, k.center().y - 40),
          k.anchor("center"),
          k.color(0, 0, 0),
        ]);

        k.add([
          k.text(`Score: ${finalScore}`, { size: 32 }),
          k.pos(k.center().x, k.center().y + 30),
          k.anchor("center"),
          k.color(100, 100, 100),
        ]);

        const btn = k.add([
          k.rect(220, 60, { radius: 8 }),
          k.pos(k.center().x, k.center().y + 120),
          k.anchor("center"),
          k.color(0, 0, 0),
          k.area(),
        ]);

        k.add([
          k.text("NEXT RANDOM", { size: 20 }),
          k.pos(k.center().x, k.center().y + 120),
          k.anchor("center"),
          k.color(255, 255, 255),
        ]);

        btn.onClick(startRandomGame);
        k.onKeyPress("space", startRandomGame);
      });

      // --- 첫 실행 ---
      startRandomGame();
    </script>
  </body>
